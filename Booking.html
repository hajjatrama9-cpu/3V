<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="احجز إقامة مريحة لكلبك الآن في فندق Loving Home">
    <meta name="keywords" content="حجز، فندق كلاب، رعاية حيوانات، الأردن">
    <meta name="author" content="Rama Hajjat">
    <title>حجز موعد | Loving Home Hotel</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html">الرئيسية</a>
            <a href="About.html">من نحن</a>
            <a href="Room.html">الغرف</a>
            <a href="Packages.html">الباقات</a>
            <a href="gallery.html">المعرض</a>
            <a href="Booking.html" class="active">الحجز</a>
        </nav>
    </header>

    <main class="section">
        <form id="bookingForm" onsubmit="validateForm(event)">
            <h1>🐾 صفحة حجز إقامة 🐾</h1>
            <p>يرجى ملء البيانات التالية لضمان حجز مكان لأليفك</p>

            <div class="form-group">
                <label for="userName">الاسم الكامل:</label>
                <input type="text" id="userName" required placeholder="ادخل اسمك الكامل">
            </div>

            <div class="form-group">
                <label for="bookDate">تاريخ بدء الحجز:</label>
                <input type="date" id="bookDate" required>
            </div>

            <div class="form-group">
                <label for="userEmail">البريد الإلكتروني:</label>
                <input type="email" id="userEmail" required placeholder="example@gmail.com">
            </div>

            <div class="form-group radio-group">
                <label>جنس الكلب:</label>
                <input type="radio" name="gender" value="female" id="female"> <label for="female">أنثى</label>
                <input type="radio" name="gender" value="male" id="male"> <label for="male">ذكر</label>
            </div>

            <div class="form-group">
                <label for="country">البلد:</label>
                <select id="country">
                    <option value="jordan">الأردن (Jordan)</option>
                    <option value="dubai">دبي (Dubai)</option>
                    <option value="turkiye">تركيا (Türkiye)</option>
                    <option value="syria">سوريا (Syria)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">ملاحظات إضافية:</label>
                <textarea id="notes" rows="4" placeholder="هل هناك أي احتياجات خاصة لكلبك؟"></textarea>
            </div>

            <button type="submit" class="btn-submit">تأكيد وإرسال الطلب 🐾</button>
        </form>
    </main>

    <footer>
        <p>© 2024 جميع الحقوق محفوظة لـ Loving Home Hotel</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
